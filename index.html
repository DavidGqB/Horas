<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Mis Horas"/>
<title>Mis Horas de Trabajo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0f0f13;color:#f0ede8;font-family:'Courier New',monospace;min-height:100vh;}
input,select,button{font-family:'Courier New',monospace;outline:none;}

#header{background:#1a1a22;border-bottom:2px solid #2a2a36;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;}
#header-title{font-size:17px;font-weight:700;letter-spacing:1px;}
#header-sub{font-size:10px;letter-spacing:3px;color:#888;margin-bottom:3px;}
#total-badge{background:#1e1e2e;border:1px solid #a78bfa44;color:#a78bfa;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;}

#tabs{display:flex;background:#15151c;border-bottom:1px solid #2a2a36;position:sticky;top:57px;z-index:99;}
.tab{flex:1;padding:12px;border:none;border-bottom:2px solid transparent;background:transparent;color:#666;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:1px;}
.tab.active{background:#1e1e2e;color:#a78bfa;border-bottom-color:#a78bfa;}

#main{max-width:700px;margin:0 auto;padding:20px 14px 80px;}

/* Quincena selector */
#quincena-box{display:grid;grid-template-columns:1fr 1fr;gap:10px;background:#1a1a22;border-radius:10px;padding:14px;border:1px solid #2a2a36;margin-bottom:16px;}
.meta-label{font-size:10px;color:#888;letter-spacing:2px;display:block;margin-bottom:6px;}
.field{width:100%;background:#0f0f13;border:1px solid #3a3a50;color:#f0ede8;padding:8px 10px;border-radius:7px;font-size:14px;font-family:inherit;}
select.field option{background:#1a1a22;}

/* Semana block */
.semana-block{background:#1a1a22;border-radius:10px;border:1px solid #2a2a36;overflow:hidden;margin-bottom:14px;}
.semana-header{padding:10px 14px;background:#1e1e2e;display:flex;align-items:center;justify-content:space-between;}
.semana-title{font-size:12px;font-weight:700;letter-spacing:2px;color:#a78bfa;}
.semana-hrs{font-size:13px;color:#4ade80;font-weight:700;}

/* Day row */
.day-row{padding:10px 12px;border-bottom:1px solid #1e1e2e;}
.day-row:last-of-type{border-bottom:none;}
.day-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.day-label{font-size:13px;color:#ccc;font-weight:700;}
.day-hrs{font-size:12px;color:#555;}
.day-hrs.hasval{color:#4ade80;font-weight:700;}
.btn-del-day{background:none;border:none;color:#444;font-size:15px;cursor:pointer;padding:0 4px;}

/* Time inputs with AM/PM */
.day-times{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.time-group{display:flex;flex-direction:column;gap:4px;}
.time-group-label{font-size:9px;color:#666;letter-spacing:2px;}
.time-row{display:flex;gap:4px;align-items:center;}
.time-input{flex:1;background:#0f0f13;border:1px solid #333;color:#f0ede8;padding:7px 8px;border-radius:5px;font-size:14px;font-family:inherit;text-align:center;min-width:0;}
.ampm-btns{display:flex;flex-direction:column;gap:2px;}
.ampm-btn{background:#0f0f13;border:1px solid #333;color:#666;border-radius:4px;padding:2px 6px;cursor:pointer;font-family:inherit;font-size:10px;font-weight:700;line-height:1.4;}
.ampm-btn.active{background:#7c3aed;border-color:#7c3aed;color:#fff;}

/* Quick add days */
.quick-add{padding:10px 12px;border-top:1px solid #1e1e2e;}
.quick-add-label{font-size:9px;color:#666;letter-spacing:2px;margin-bottom:7px;}
.dias-btns{display:flex;flex-wrap:wrap;gap:6px;}
.dia-btn{background:#0f0f13;border:1px solid #2a2a36;color:#888;border-radius:6px;padding:6px 10px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;transition:all .15s;}
.dia-btn:active{background:#2a2a40;color:#a78bfa;}
.dia-btn.agregado{background:#1a2a1a;border-color:#166534;color:#4ade80;}

/* Buttons */
.btn-primary{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:1px;margin-bottom:10px;}
.btn-secondary{width:100%;padding:11px;border-radius:9px;border:1px solid #2a2a36;background:transparent;color:#666;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;margin-bottom:10px;}

/* Result */
pre{background:#111118;border:1px solid #2a2a36;border-radius:10px;padding:16px;font-size:13px;line-height:1.9;white-space:pre-wrap;color:#ddd;margin-bottom:10px;}

/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:#000000bb;z-index:1000;align-items:center;justify-content:center;padding:16px;}
#modal-overlay.show{display:flex;}
.modal-box{background:#1a1a22;border:1px solid #3a3a50;border-radius:12px;padding:22px;width:100%;max-width:380px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-title{font-weight:700;font-size:14px;color:#a78bfa;letter-spacing:1px;}
.modal-close{background:none;border:none;color:#666;font-size:18px;cursor:pointer;}
.modal-body{color:#ccc;font-size:13px;margin-bottom:20px;line-height:1.6;}
.modal-action-btns{display:flex;gap:10px;}
.btn-modal-cancel{flex:1;padding:10px;border-radius:7px;border:1px solid #333;background:#1e1e2e;color:#888;cursor:pointer;font-family:inherit;font-size:13px;}
.btn-modal-ok{flex:1;padding:10px;border-radius:7px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;}

/* Toast */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#7c3aed;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;transition:all .3s;z-index:2000;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div id="header">
  <div>
    <div id="header-sub">CONTROL DE HORAS</div>
    <div id="header-title">⏱ Mis Horas de Trabajo</div>
  </div>
  <div id="total-badge">Total: 0 hrs</div>
</div>

<div id="tabs">
  <button class="tab active" id="tab-form" onclick="switchTab('form')">📝 Registro</button>
  <button class="tab" id="tab-resultado" onclick="switchTab('resultado')">📄 Resumen</button>
</div>

<div id="main">
  <div id="view-form">
    <div id="quincena-box">
      <div>
        <label class="meta-label">MES</label>
        <select id="sel-mes" class="field" onchange="actualizarQuincena()">
          <option value="0">Enero</option>
          <option value="1">Febrero</option>
          <option value="2">Marzo</option>
          <option value="3">Abril</option>
          <option value="4">Mayo</option>
          <option value="5">Junio</option>
          <option value="6">Julio</option>
          <option value="7">Agosto</option>
          <option value="8">Septiembre</option>
          <option value="9">Octubre</option>
          <option value="10">Noviembre</option>
          <option value="11">Diciembre</option>
        </select>
      </div>
      <div>
        <label class="meta-label">AÑO</label>
        <input type="number" id="sel-anio" class="field" value="2026" min="2024" max="2030" onchange="actualizarQuincena()"/>
      </div>
      <div style="grid-column:1/-1;">
        <label class="meta-label">QUINCENA</label>
        <div style="display:flex;gap:8px;">
          <button id="btn-q1" onclick="selQuincena(1)"
            style="flex:1;padding:9px;border-radius:7px;border:2px solid #7c3aed;background:#7c3aed22;color:#a78bfa;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;">
            1ra · Días 1–15
          </button>
          <button id="btn-q2" onclick="selQuincena(2)"
            style="flex:1;padding:9px;border-radius:7px;border:1px solid #333;background:transparent;color:#555;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;">
            2da · Días 16–fin
          </button>
        </div>
      </div>
      <div style="grid-column:1/-1;">
        <button onclick="autoGenerarDias()"
          style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#065f46,#059669);color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:1px;">
          📅 GENERAR DÍAS AUTOMÁTICAMENTE
        </button>
        <div style="font-size:10px;color:#555;margin-top:5px;letter-spacing:1px;">Excluye lunes · Divide en Semana 1 y 2</div>
      </div>
    </div>

    <div id="semanas-container"></div>

    <button class="btn-primary" onclick="generarResumen()">✅ GENERAR RESUMEN</button>
    <button class="btn-secondary" onclick="confirmarNuevaQuincena()">🔄 NUEVA QUINCENA</button>
  </div>

  <div id="view-resultado" style="display:none;">
    <pre id="result-pre"></pre>
    <button class="btn-primary" onclick="copiar()">📋 COPIAR TEXTO</button>
    <button class="btn-secondary" onclick="switchTab('form')">✏️ Editar</button>
  </div>
</div>

<div id="modal-overlay" onclick="closeModalIfOverlay(event)">
  <div class="modal-box" id="modal-box"></div>
</div>
<div id="toast"></div>

<script>
const NOMBRES_DIA = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const NOMBRES_MES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DIAS_SEMANA = ['Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];

let quincenaActual = 1; // 1 o 2
let semanas = [
  { nombre:'Semana 1', dias:[] },
  { nombre:'Semana 2', dias:[] }
];

// ─── QUINCENA SELECTOR ───────────────────────────────────
function selQuincena(q){
  quincenaActual = q;
  document.getElementById('btn-q1').style.cssText = q===1
    ? 'flex:1;padding:9px;border-radius:7px;border:2px solid #7c3aed;background:#7c3aed22;color:#a78bfa;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;'
    : 'flex:1;padding:9px;border-radius:7px;border:1px solid #333;background:transparent;color:#555;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;';
  document.getElementById('btn-q2').style.cssText = q===2
    ? 'flex:1;padding:9px;border-radius:7px;border:2px solid #7c3aed;background:#7c3aed22;color:#a78bfa;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;'
    : 'flex:1;padding:9px;border-radius:7px;border:1px solid #333;background:transparent;color:#555;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700;';
  guardar();
}

function actualizarQuincena(){ guardar(); }

// ─── AUTO GENERAR DÍAS ───────────────────────────────────
function autoGenerarDias(){
  const mes  = parseInt(document.getElementById('sel-mes').value);
  const anio = parseInt(document.getElementById('sel-anio').value);

  // Días de la quincena
  const diasEnMes = new Date(anio, mes + 1, 0).getDate(); // 28/29/30/31
  const inicio = quincenaActual === 1 ? 1  : 16;
  const fin    = quincenaActual === 1 ? 15 : diasEnMes;

  // Recolectar todos los días hábiles (sin lunes) de la quincena
  const diasHabiles = [];
  for(let d = inicio; d <= fin; d++){
    const fecha = new Date(anio, mes, d);
    const diaSemana = fecha.getDay(); // 0=Dom,1=Lun,...,6=Sab
    if(diaSemana !== 1){ // excluir lunes
      diasHabiles.push({ fecha, nombre: NOMBRES_DIA[diaSemana], num: d });
    }
  }

  // Dividir en 2 semanas: primera mitad y segunda mitad
  const mitad = Math.ceil(diasHabiles.length / 2);
  const grupo1 = diasHabiles.slice(0, mitad);
  const grupo2 = diasHabiles.slice(mitad);

  semanas = [
    {
      nombre: `Semana 1 (${inicio}–${grupo1[grupo1.length-1]?.num || inicio})`,
      dias: grupo1.map(d => ({
        nombre:       `${d.nombre} ${d.num}`,
        entrada:      '',
        entradaAMPM:  'PM',
        salida:       '10',
        salidaAMPM:   'PM'
      }))
    },
    {
      nombre: `Semana 2 (${grupo2[0]?.num || ''}–${fin})`,
      dias: grupo2.map(d => ({
        nombre:       `${d.nombre} ${d.num}`,
        entrada:      '',
        entradaAMPM:  'PM',
        salida:       '10',
        salidaAMPM:   'PM'
      }))
    }
  ];

  guardar();
  render();
  const mesNombre = NOMBRES_MES[mes];
  showToast(`📅 ${diasHabiles.length} días generados — ${mesNombre} ${anio}`);
}

// ─── TIEMPO ──────────────────────────────────────────────
function toMinutos(hora, ampm){
  if(!hora || !String(hora).trim()) return null;
  const str = String(hora).trim();
  const match = str.match(/^(\d{1,2})(?:[:\.](\d{2}))?$/);
  if(!match) return null;
  let h = parseInt(match[1]);
  const m = match[2] ? parseInt(match[2]) : 0;
  if(ampm === 'AM'){ if(h === 12) h = 0; }
  else if(ampm === 'PM'){ if(h !== 12) h += 12; }
  return h * 60 + m;
}

function calcularHrs(dia){
  const eMin = toMinutos(dia.entrada, dia.entradaAMPM);
  const sMin = toMinutos(dia.salida,  dia.salidaAMPM);
  if(eMin === null || sMin === null) return null;
  let diff = sMin - eMin;
  if(diff < 0) diff += 24 * 60;
  return diff / 60;
}

function formatHrs(h){
  if(h === null || isNaN(h)) return '—';
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return mm > 0 ? `${hh}h ${mm}m` : `${hh}h`;
}

function totalSemana(semana){
  return semana.dias.reduce((a, d) => { const h = calcularHrs(d); return a + (h||0); }, 0);
}
function totalQuincena(){ return semanas.reduce((a,s) => a + totalSemana(s), 0); }

// ─── RENDER ──────────────────────────────────────────────
function render(){
  const container = document.getElementById('semanas-container');
  container.innerHTML = '';

  semanas.forEach((semana, si) => {
    const hrs = totalSemana(semana);
    const block = document.createElement('div');
    block.className = 'semana-block';

    let html = `
      <div class="semana-header">
        <span class="semana-title">${semana.nombre.toUpperCase()}</span>
        <span class="semana-hrs" id="shrs-${si}">${formatHrs(hrs)}</span>
      </div>`;

    semana.dias.forEach((dia, di) => {
      const h = calcularHrs(dia);
      html += `
        <div class="day-row" id="dia-${si}-${di}">
          <div class="day-top">
            <span class="day-label">${dia.nombre}</span>
            <div style="display:flex;align-items:center;gap:10px;">
              <span class="day-hrs${h!==null?' hasval':''}" id="dhrs-${si}-${di}">${formatHrs(h)}</span>
              <button class="btn-del-day" onclick="eliminarDia(${si},${di})">✕</button>
            </div>
          </div>
          <div class="day-times">
            <div class="time-group">
              <span class="time-group-label">ENTRADA</span>
              <div class="time-row">
                <input type="text" class="time-input" placeholder="9" value="${dia.entrada}"
                  oninput="setDiaCampo(${si},${di},'entrada',this.value)" inputmode="decimal"/>
                <div class="ampm-btns">
                  <button class="ampm-btn${dia.entradaAMPM==='AM'?' active':''}"
                    onclick="setDiaCampo(${si},${di},'entradaAMPM','AM')">AM</button>
                  <button class="ampm-btn${dia.entradaAMPM==='PM'?' active':''}"
                    onclick="setDiaCampo(${si},${di},'entradaAMPM','PM')">PM</button>
                </div>
              </div>
            </div>
            <div class="time-group">
              <span class="time-group-label">SALIDA</span>
              <div class="time-row">
                <input type="text" class="time-input" placeholder="10" value="${dia.salida}"
                  oninput="setDiaCampo(${si},${di},'salida',this.value)" inputmode="decimal"/>
                <div class="ampm-btns">
                  <button class="ampm-btn${dia.salidaAMPM==='AM'?' active':''}"
                    onclick="setDiaCampo(${si},${di},'salidaAMPM','AM')">AM</button>
                  <button class="ampm-btn${dia.salidaAMPM==='PM'?' active':''}"
                    onclick="setDiaCampo(${si},${di},'salidaAMPM','PM')">PM</button>
                </div>
              </div>
            </div>
          </div>
        </div>`;
    });

    // Quick add extra days
    html += `<div class="quick-add">
      <div class="quick-add-label">＋ DÍA EXTRA</div>
      <div class="dias-btns">`;
    DIAS_SEMANA.forEach(dia => {
      html += `<button class="dia-btn" onclick="agregarDiaRapido(${si},'${dia}')">${dia}</button>`;
    });
    html += `</div></div>`;

    block.innerHTML = html;
    container.appendChild(block);
  });

  document.getElementById('total-badge').textContent = `Total: ${formatHrs(totalQuincena())}`;
}

function setDiaCampo(si, di, campo, valor){
  semanas[si].dias[di][campo] = valor;
  const h = calcularHrs(semanas[si].dias[di]);
  const dhrs = document.getElementById(`dhrs-${si}-${di}`);
  if(dhrs){ dhrs.textContent = formatHrs(h); dhrs.className = 'day-hrs'+(h!==null?' hasval':''); }
  const shrs = document.getElementById(`shrs-${si}`);
  if(shrs) shrs.textContent = formatHrs(totalSemana(semanas[si]));
  document.getElementById('total-badge').textContent = `Total: ${formatHrs(totalQuincena())}`;
  if(campo==='entradaAMPM'||campo==='salidaAMPM'){
    const row = document.getElementById(`dia-${si}-${di}`);
    if(row){
      const grupIdx = campo==='entradaAMPM'?0:1;
      const btns = row.querySelectorAll('.time-group')[grupIdx]?.querySelectorAll('.ampm-btn');
      if(btns) btns.forEach(b=>{ b.className='ampm-btn'+(b.textContent===valor?' active':''); });
    }
  }
  guardar();
}

function agregarDiaRapido(si, diaNombre){
  semanas[si].dias.push({ nombre:diaNombre, entrada:'', entradaAMPM:'PM', salida:'10', salidaAMPM:'PM' });
  guardar(); render();
  showToast(`✅ ${diaNombre} agregado`);
}

function eliminarDia(si, di){
  semanas[si].dias.splice(di,1);
  guardar(); render();
}

// ─── GENERAR RESUMEN ─────────────────────────────────────
function generarResumen(){
  const mes    = parseInt(document.getElementById('sel-mes').value);
  const anio   = document.getElementById('sel-anio').value;
  const qLabel = quincenaActual===1 ? '1ra (1–15)' : '2da (16–fin)';
  const mesNombre = NOMBRES_MES[mes];

  let txt = `⏱ HORAS DE TRABAJO\n`;
  txt += `${qLabel} Quincena · ${mesNombre} ${anio}\n`;
  txt += `${'─'.repeat(34)}\n\n`;

  semanas.forEach(semana => {
    txt += `${semana.nombre}\n`;
    semana.dias.forEach(dia => {
      const h = calcularHrs(dia);
      const hStr = h!==null ? ` (${formatHrs(h)})` : '';
      const entrada = dia.entrada ? `${dia.entrada} ${dia.entradaAMPM}` : '?';
      const salida  = dia.salida  ? `${dia.salida} ${dia.salidaAMPM}`  : '?';
      txt += `- ${dia.nombre} ${entrada} a ${salida}${hStr}\n`;
    });
    txt += `Hrs de la semana: ${formatHrs(totalSemana(semana))}\n\n`;
  });

  txt += `${'─'.repeat(34)}\n`;
  txt += `TOTAL DE HORAS: ${formatHrs(totalQuincena())}`;

  document.getElementById('result-pre').textContent = txt;
  switchTab('resultado');
}

async function copiar(){
  const texto = document.getElementById('result-pre').textContent;
  try{ await navigator.clipboard.writeText(texto); showToast('✅ Copiado'); }
  catch(e){
    const a=document.createElement('textarea'); a.value=texto;
    document.body.appendChild(a); a.select(); document.execCommand('copy');
    document.body.removeChild(a); showToast('✅ Copiado');
  }
}

// ─── NUEVA QUINCENA ──────────────────────────────────────
function confirmarNuevaQuincena(){
  openModal(`
    <div class="modal-header">
      <span class="modal-title">🔄 Nueva quincena</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <p class="modal-body">Esto borrará todos los días registrados. Luego presiona 📅 GENERAR DÍAS para cargar la nueva quincena automáticamente.</p>
    <div class="modal-action-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-ok" onclick="doNuevaQuincena()">Sí, limpiar</button>
    </div>
  `);
}

function doNuevaQuincena(){
  semanas = [{ nombre:'Semana 1', dias:[] },{ nombre:'Semana 2', dias:[] }];
  // Avanzar quincena automáticamente
  if(quincenaActual===1){
    selQuincena(2);
  } else {
    selQuincena(1);
    // Avanzar mes
    let mes = parseInt(document.getElementById('sel-mes').value);
    let anio = parseInt(document.getElementById('sel-anio').value);
    mes++;
    if(mes > 11){ mes=0; anio++; document.getElementById('sel-anio').value=anio; }
    document.getElementById('sel-mes').value = mes;
  }
  closeModal(); guardar(); render();
  showToast('🔄 Lista — presiona 📅 GENERAR DÍAS');
}

// ─── PERSISTENCIA ────────────────────────────────────────
function guardar(){
  try{
    localStorage.setItem('horas_semanas',   JSON.stringify(semanas));
    localStorage.setItem('horas_quincena',  String(quincenaActual));
    localStorage.setItem('horas_mes',       document.getElementById('sel-mes').value);
    localStorage.setItem('horas_anio',      document.getElementById('sel-anio').value);
  }catch(e){}
}

function cargar(){
  try{
    const s = localStorage.getItem('horas_semanas');
    const q = localStorage.getItem('horas_quincena');
    const m = localStorage.getItem('horas_mes');
    const a = localStorage.getItem('horas_anio');
    if(s) semanas = JSON.parse(s);
    if(q){ quincenaActual=parseInt(q); selQuincena(quincenaActual); }
    if(m) document.getElementById('sel-mes').value  = m;
    if(a) document.getElementById('sel-anio').value = a;
    return !!s;
  }catch(e){ return false; }
}

// ─── TABS ────────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('view-form').style.display      = tab==='form'      ?'':'none';
  document.getElementById('view-resultado').style.display = tab==='resultado' ?'':'none';
  document.getElementById('tab-form').classList.toggle('active',      tab==='form');
  document.getElementById('tab-resultado').classList.toggle('active', tab==='resultado');
}

// ─── MODAL ───────────────────────────────────────────────
function openModal(html, onShow){
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('show');
  if(onShow) onShow();
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('show'); }
function closeModalIfOverlay(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── INIT ────────────────────────────────────────────────
// Set current month/year as default
(function(){
  const hoy = new Date();
  document.getElementById('sel-mes').value  = hoy.getMonth();
  document.getElementById('sel-anio').value = hoy.getFullYear();
})();
const teniaDatos = cargar();
render();
if(teniaDatos) setTimeout(()=>showToast('💾 Quincena cargada'),300);
</script>
